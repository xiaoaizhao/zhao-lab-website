{{ define "main" }}
{{ partial "hero.html" . }}
<section class="contact-section">
  <div class="container">
    <h2>Come visit us!</h2>
    <p class="contact-lead">Our laboratory is located in the Sterling Hall of Medicine at Yale School of Medicine.</p>
    <div class="contact-details">
      <div class="contact-address">
        <h3>Address</h3>
        <a href="https://maps.google.com/?q=Sterling+Hall+of+Medicine+Yale+School+of+Medicine+New+Haven+CT" target="_blank" rel="noopener">
          Sterling Hall of Medicine<br>
          Yale School of Medicine<br>
          New Haven, CT
        </a>
      </div>
      <div class="contact-social">
        <h3>Follow Us</h3>
        <a href="{{ .Site.Params.twitter }}" target="_blank" rel="noopener" class="twitter-link">
          {{ .Site.Params.twitter_handle }} on X ↗
        </a>
      </div>
    </div>
  </div>
</section>
{{ end }}
