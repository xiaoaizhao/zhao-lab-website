- name: "Xiaoai Zhao, M.D., Ph.D."
  role: "Principal Investigator"
  photo: "/images/team/xiaoai-zhao.png"
  bio: "I completed my medical training in Nanjing, China before moving across the Pacific. I joined John Sedivy's lab at Brown University for my graduate degree, where I studied molecular pathways of organismal aging in mouse model of longevity. I then completed my postdoctoral training in the laboratory of Anne Brunet at Stanford University. In my postdoctoral work, I investigated the functional consequences of complex lipidome changes during neural stem cell aging."
  interests: "great food, photography and watching race cars driving around"

- name: "Andrew (AJ) Erickson"
  role: "Postgraduate Research Assistant"
  photo: "/images/team/aj-erickson.jpeg"
  bio: "I'm originally from San Diego and completed my biochemistry degree at Vassar College. I previously worked in an organic chemistry lab researching metal-free synthesis and carbon-bond fragmentation."
  research: "Functional regulation of complex lipid composition during neural stem cell aging"
  interests: "volleyball and golf — I'm also currently watching One Piece"

- name: "Zixing (Josh) Chen"
  role: "Postdoctoral Associate"
  photo: "/images/team/josh-chen.jpg"
  bio: "I graduated from Chinese University of Hong Kong. I developed cell culture systems for gustatory research and previously worked on obesity and sterol metabolism, applying omics technologies broadly to my research."
  research: "Intricate interplay between lipids and aging, using mass spectrometry"
  interests: "hiking, reading, and contemporary philosophy"

- name: "Natalie Ito"
  role: "Postgraduate Research Assistant"
  photo: "/images/team/natalie-ito.jpg"
  bio: "I graduated from New York University with a degree in Neural Science. I previously researched protein synthesis in memory consolidation, systemic inflammation effects on cognition, and regulatory mechanisms of neuropsychiatric disorders in iPSC-derived neurons."
  research: "Molecular mechanisms, regulatory pathways, and genetic and environmental factors influencing cellular aging; lipidomic changes"
  interests: "baking, language learning, and exploring cafes"
